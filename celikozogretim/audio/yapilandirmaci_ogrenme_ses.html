<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yapılandırmacı Öğrenme Kuramı — Öğretmen Adayları Sohbeti</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',sans-serif;background:#0f1a0a;color:#f0ede8;min-height:100vh;padding:1.5rem 1rem}
  .container{max-width:680px;margin:0 auto}
  .header{text-align:center;margin-bottom:1.5rem}
  .topic-badge{display:inline-block;background:#1a2e0d;border:1px solid #3b6d11;border-radius:20px;padding:.3rem 1rem;font-size:.75rem;font-weight:700;color:#97C459;letter-spacing:.06em;text-transform:uppercase;margin-bottom:.6rem}
  h1{font-size:1.3rem;font-weight:800;margin-bottom:.2rem}
  .meta{font-size:.8rem;color:#4a6a3a}
  .big-play{width:100%;background:#3B6D11;border:none;border-radius:14px;padding:1rem;font-family:'Nunito',sans-serif;font-size:1.1rem;font-weight:800;color:#fff;cursor:pointer;margin-bottom:1rem;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:.6rem}
  .big-play:hover{background:#2d5509}
  .big-play:disabled{background:#1a2e0d;color:#4a6a3a;cursor:not-allowed}
  .mini-controls{display:flex;gap:.6rem;margin-bottom:1rem}
  .btn{flex:1;border:none;border-radius:10px;padding:.55rem;font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .15s}
  .btn-pause{background:#f4a261;color:#0f1a0a}
  .btn-pause:hover{background:#e0904f}
  .btn-stop{background:#1a2e0d;color:#97C459;border:1px solid #3b6d11}
  .btn-stop:hover{background:#243d14}
  .btn:disabled{opacity:.35;cursor:not-allowed}
  .prog-wrap{margin-bottom:.5rem}
  .prog-bar{background:#1a2e0d;border-radius:6px;height:5px;overflow:hidden;margin-bottom:.3rem}
  .prog-fill{height:100%;background:linear-gradient(90deg,#3B6D11,#97C459);border-radius:6px;width:0%;transition:width .4s}
  .prog-label{font-size:.72rem;color:#4a6a3a;text-align:right}
  .settings{background:#1a2e0d;border-radius:12px;padding:.8rem 1rem;margin-bottom:1rem}
  .settings-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#4a6a3a;margin-bottom:.7rem}
  .voice-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:.6rem}
  .voice-item label{font-size:.7rem;font-weight:700;display:block;margin-bottom:.3rem}
  .elif-col label{color:#f4a261}
  .mert-col label{color:#97C459}
  select{width:100%;background:#0f1a0a;border:1px solid #3b6d11;color:#f0ede8;border-radius:7px;padding:.3rem .5rem;font-size:.75rem;font-family:'Nunito',sans-serif;cursor:pointer;outline:none}
  .speed-row{display:flex;align-items:center;gap:.7rem}
  .speed-row span{font-size:.75rem;color:#4a6a3a;white-space:nowrap}
  input[type=range]{flex:1;accent-color:#3B6D11;cursor:pointer;height:4px}
  .speed-val{font-size:.75rem;color:#f0ede8;min-width:34px;text-align:right}
  .segment{margin-bottom:.5rem}
  .seg-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:.2rem .7rem;border-radius:20px;display:inline-block;margin-bottom:.5rem}
  .seg-dialog{background:#3B6D1130;color:#97C459;border:1px solid #3B6D1140}
  .seg-summary{background:#f4a26130;color:#f4a261;border:1px solid #f4a26140}
  .line{border-radius:10px;padding:.75rem 1rem;margin-bottom:.5rem;opacity:.4;border:2px solid transparent;transition:all .25s}
  .line.elif{background:#1a2e0d}
  .line.mert{background:#0f2008;margin-left:5%}
  .line.narrator{background:#0a180a;margin:0;border-radius:8px;font-style:italic}
  .line.active{opacity:1;transform:scale(1.01)}
  .line.elif.active{border-color:#f4a261}
  .line.mert.active{border-color:#97C459}
  .line.narrator.active{border-color:#C0DD97}
  .speaker{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.25rem}
  .elif .speaker{color:#f4a261}
  .mert .speaker{color:#97C459}
  .narrator .speaker{color:#C0DD97}
  .text{font-size:.88rem;line-height:1.65;color:#8a9a7a}
  .line.active .text{color:#f0ede8}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="topic-badge">Yapılandırmacı Öğrenme Kuramı</div>
    <h1>Piaget, Bruner ve Yapılandırmacılık</h1>
    <div class="meta">İki Öğretmen Adayının Sohbeti • ~10 dakika</div>
  </div>

  <button class="big-play" id="btn-play" onclick="startPlay()">▶ Dinlemeye Başla</button>
  <div class="mini-controls">
    <button class="btn btn-pause" id="btn-pause" onclick="togglePause()" disabled>⏸ Duraklat</button>
    <button class="btn btn-stop" id="btn-stop" onclick="stopPlay()" disabled>⏹ Durdur</button>
  </div>

  <div class="prog-wrap">
    <div class="prog-bar"><div class="prog-fill" id="progress"></div></div>
    <div class="prog-label" id="prog-text">0 / 0</div>
  </div>

  <div class="settings">
    <div class="settings-title">Ses Ayarları</div>
    <div class="voice-grid">
      <div class="voice-item elif-col"><label>Elif (Kadın)</label><select id="elif-voice"></select></div>
      <div class="voice-item mert-col"><label>Mert (Erkek)</label><select id="mert-voice"></select></div>
    </div>
    <div class="speed-row">
      <span>Konuşma hızı:</span>
      <input type="range" id="speed" min="0.6" max="1.5" step="0.05" value="0.95" oninput="document.getElementById('speed-val').textContent=parseFloat(this.value).toFixed(2)+'x'">
      <span class="speed-val" id="speed-val">0.95x</span>
    </div>
  </div>

  <div class="segment">
    <span class="seg-label seg-dialog">Sohbet</span>
    <div id="dialog-lines"></div>
  </div>

  <div class="segment">
    <span class="seg-label seg-summary">Sesli Özet</span>
    <div id="summary-lines"></div>
  </div>
</div>

<script>
const DIALOG = [
  {s:1,t:"Mert, yapılandırmacı öğrenme kuramını anlamaya çalışıyorum ama bilişsel öğrenme kuramıyla çok karışıyor. İkisi arasındaki temel fark ne?"},
  {s:2,t:"Bu çok sorduğum bir soru. Şöyle ayıralım: Bilişselciler diyor ki — bilgi dışarıda var, zihin onu alır ve işler. Yapılandırmacılar ise diyor ki — bilgi yoktur, birey onu kendi deneyimleriyle yaratır."},
  {s:1,t:"Yani bilişselcilerde bilgi pasif alınırken yapılandırmacılarda aktif inşa ediliyor."},
  {s:2,t:"Tam olarak. Bilişselcide zihin işleyen bir makine. Yapılandırmacıda zihin inşa eden bir usta. Aynı malzemeye bakmıyorlar bile — biri bilgiyi alıyor, diğeri bilgiyi üretiyor."},
  {s:1,t:"Piaget'den başlayalım. O hem bilişsel hem yapılandırmacı deniyor. Hangisi?"},
  {s:2,t:"Piaget'nin öğrenme mekanizması — şema, özümseme, uyum, dengeleme — bunlar bilişsel süreçler. Ama Piaget'nin temel felsefesi yapılandırmacı: çocuk dünyayla etkileşerek bilgiyi kendisi inşa eder. Bu yüzden yapılandırmacılığın babası sayılır."},
  {s:1,t:"Peki şema, özümseme, uyum nasıl çalışıyor?"},
  {s:2,t:"Şema, zihindeki bilgi çerçevesi. Örneğin çocuğun zihninde köpek şeması var — dört ayaklı, havlayan. Yeni bir köpek görür, bu şemaya uydurur — özümseme. Sonra bir kedi görür, köpek sanır ama kedi miyavlar — şema çalışmıyor, dengesizlik. Zihin yeni şema inşa eder — uyum. Denge yeniden kurulur."},
  {s:1,t:"Bu süreç sürekli tekrar ediyor mu?"},
  {s:2,t:"Sürekli. Her yeni deneyim ya mevcut şemaya özümsenir ya da yeni şema inşasını tetikler. Piaget diyor ki öğrenme bu döngüdür. Ve kritik nokta şu: bu içeriden başlar — çocuk deneyimler, zihin yeniden yapılanır."},
  {s:1,t:"Bruner'e geçelim. O yapılandırmacı mı bilişselci mi?"},
  {s:2,t:"Bruner ikisinde de geçiyor ama ağırlığı yapılandırmacıda. Neden? Çünkü Bruner'in temel argümanı şu: bilgi verilmez, keşfedilir. Öğrenci ipuçlarıyla, deneyerek, yanılarak kendi bilgisini inşa eder."},
  {s:1,t:"Keşif yoluyla öğrenme bu mu?"},
  {s:2,t:"Evet. Bruner diyor ki: öğretmen bilgiyi sunmamalı — keşif ortamı hazırlamalı. Öğrenci kendi sorusunu sorar, kendi cevabını arar, kendi anlamını inşa eder. Bu Ausubel'den farklı."},
  {s:1,t:"Ausubel ile Bruner arasındaki fark tam olarak nerede?"},
  {s:2,t:"Ausubel alımlı öğrenmeyi savunuyor — iyi hazırlanmış açıklayıcı öğretim, önceki bilgiyle anlamlı bağlantı. Bilgi dışarıdan anlamlı biçimde sunulabilir. Bruner ise diyor ki hayır — öğrenci keşfetmeli. İkisi de anlamlılığı vurguluyor ama yol farklı."},
  {s:1,t:"Yani Ausubel bilişsel, Bruner yapılandırmacı diyebilir miyiz?"},
  {s:2,t:"Literatürde böyle kabul ediliyor genel olarak. Ausubel önceki bilişsel yapıya bağlanmayı anlatıyor — bu bilişsel mekanizma. Bruner sıfırdan inşa etmeyi anlatıyor — bu yapılandırmacı süreç. Ama her ikisi de örtüşen alanlarda çalışıyor."},
  {s:1,t:"Peki Vygotsky ne olacak? Biz onu sosyal öğrenmeye koyduk ama yapılandırmacı da deniyor."},
  {s:2,t:"Vygotsky için en doğru tanım sosyal yapılandırmacı. Yani hem sosyal öğrenme hem yapılandırmacılık. Biz sosyal öğrenmeye koyduk — bu kabul görmüş bir yerleştirme. Ama şunu da bilmek gerekiyor: Vygotsky'nin ZPD ve iskele kavramları yapılandırmacılığın temel kavramlarıdır."},
  {s:1,t:"Piaget ve Vygotsky arasındaki fark nedir o zaman?"},
  {s:2,t:"Piaget bireysel yapılandırmacı — çocuk dünyayla baş başa deneyimleyerek öğrenir. Vygotsky sosyal yapılandırmacı — öğrenme önce sosyal ortamda, başkasıyla birlikte gerçekleşir, sonra içselleşir. Piaget'de çocuk aktif keşifçi, Vygotsky'de sosyal etkileşim şart."},
  {s:1,t:"Yapılandırmacılıkta öğretmenin rolü ne?"},
  {s:2,t:"Bu çok önemli. Yapılandırmacı öğretmen anlatmaz — ortam tasarlar. Keşif fırsatları sunar, sorular sorar, rehberlik eder. Piaget'de öğretmen gelişim dönemine uygun materyal hazırlar. Bruner'de keşif ortamı kurar. Vygotsky'de ZPD'yi tespit eder ve iskele kurar."},
  {s:1,t:"Peki bilişsel kuramla yapılandırmacılığın en belirgin ortak noktası ne?"},
  {s:2,t:"Her ikisi de öğrencinin zihinsel olarak aktif olmasını vurguluyor. Pasif dinleyici değil — aktif düşünen. Her ikisi de önceki bilginin önemini kabul ediyor. Ve her ikisi de anlamayı ezberin önüne koyuyor."},
  {s:1,t:"Farkları ise?"},
  {s:2,t:"Bilişselci — bilgi var, zihin onu işler ve depolar. Yapılandırmacı — bilgi bireyin deneyimiyle yaratılır, keşfedilir. Bilişselci daha çok zihnin mekanizmasını inceler. Yapılandırmacı daha çok bilginin nasıl inşa edildiğini inceler."},
  {s:1,t:"Çok netleşti. Sesli özeti dinleyelim mi?"},
  {s:2,t:"Gel özetleyelim."},
];

const SUMMARY = [
  {s:0,t:"Yapılandırmacı öğrenme kuramını beş temel başlıkta özetleyelim."},
  {s:1,t:"Birinci madde: Yapılandırmacılığın temel ilkesi — bilgi yoktur, birey onu deneyimleriyle inşa eder. Bilişselcilikten farkı burada: bilişselci zihin bilgiyi işler, yapılandırmacı zihin bilgiyi üretir."},
  {s:2,t:"İkinci madde: Piaget bireysel yapılandırmacılığın babasıdır. Şema, özümseme, uyum ve dengeleme döngüsüyle çocuk dünyayla etkileşerek bilgisini inşa eder. Her yeni deneyim ya mevcut şemaya eklenir ya da yeni şema doğurur."},
  {s:1,t:"Üçüncü madde: Bruner keşif yoluyla öğrenmeyi savunur. Bilgi verilmez — keşfedilir. Öğretmen ortam hazırlar, öğrenci kendi bilgisini inşa eder. Ausubel'den farkı: Ausubel anlamlı sunumu, Bruner keşfi esas alır."},
  {s:2,t:"Dördüncü madde: Vygotsky sosyal yapılandırmacıdır. Öğrenme önce sosyal ortamda başkasıyla birlikte, sonra bireysel olarak içselleşir. ZPD ve iskele kavramları yapılandırmacılığın temel taşlarıdır."},
  {s:1,t:"Beşinci madde: Bilişselcilik ve yapılandırmacılık ortak noktaları — her ikisi de aktif zihin, önceki bilginin önemi ve anlamayı vurgular. Farkları — bilişselci bilgiyi işler, yapılandırmacı bilgiyi inşa eder."},
  {s:0,t:"Yapılandırmacı öğrenme kuramının özü şudur: Birey bilginin pasif alıcısı değil, aktif inşacısıdır. Öğrenme içeriden büyür — deneyimle, keşifle, sosyal etkileşimle."},
];

const synth=window.speechSynthesis;
let allLines=[],currentIdx=-1,paused=false,utterance=null;

function buildLines(){
  const dl=document.getElementById('dialog-lines');
  const sl=document.getElementById('summary-lines');
  DIALOG.forEach((l,i)=>{
    const cls=l.s===1?'elif':'mert';
    const spk=l.s===1?'Elif':'Mert';
    const div=document.createElement('div');
    div.className='line '+cls;div.id='al'+allLines.length;
    div.innerHTML=`<div class="speaker">${spk}</div><div class="text">${l.t}</div>`;
    dl.appendChild(div);allLines.push({...l});
  });
  SUMMARY.forEach((l,i)=>{
    const cls=l.s===0?'narrator':(l.s===1?'elif':'mert');
    const spk=l.s===0?'Anlatıcı':(l.s===1?'Elif':'Mert');
    const div=document.createElement('div');
    div.className='line '+cls;div.id='al'+allLines.length;
    div.innerHTML=`<div class="speaker">${spk}</div><div class="text">${l.t}</div>`;
    sl.appendChild(div);allLines.push({...l});
  });
  document.querySelectorAll('.line').forEach((el,i)=>el.id='al'+i);
  document.getElementById('prog-text').textContent='0 / '+allLines.length;
}
buildLines();

function loadVoices(){
  const voices=synth.getVoices();
  const tr=voices.filter(v=>v.lang&&v.lang.startsWith('tr'));
  const pool=tr.length?tr:voices;
  ['elif-voice','mert-voice'].forEach(id=>{
    const sel=document.getElementById(id);sel.innerHTML='';
    pool.forEach((v,i)=>{
      const o=document.createElement('option');
      o.value=voices.indexOf(v);o.textContent=v.name;sel.appendChild(o);
    });
  });
  if(tr.length>=2){
    document.getElementById('elif-voice').value=voices.indexOf(tr[0]);
    document.getElementById('mert-voice').value=voices.indexOf(tr[1]);
  }
}
synth.addEventListener('voiceschanged',loadVoices);loadVoices();

function getVoice(s){
  const id=s===1?'elif-voice':'mert-voice';
  const idx=parseInt(document.getElementById(id).value);
  return synth.getVoices()[idx]||null;
}

function setActive(i){
  document.querySelectorAll('.line').forEach(l=>l.classList.remove('active'));
  if(i>=0){const el=document.getElementById('al'+i);if(el){el.classList.add('active');el.scrollIntoView({behavior:'smooth',block:'center'});}}
  const pct=i>=0?Math.round((i+1)/allLines.length*100):0;
  document.getElementById('progress').style.width=pct+'%';
  document.getElementById('prog-text').textContent=(i>=0?i+1:0)+' / '+allLines.length;
}

function startPlay(){
  synth.cancel();currentIdx=0;paused=false;
  document.getElementById('btn-play').disabled=true;
  document.getElementById('btn-pause').disabled=false;
  document.getElementById('btn-stop').disabled=false;
  playLine(0);
}

function playLine(i){
  if(i>=allLines.length){stopPlay();return;}
  currentIdx=i;setActive(i);
  const l=allLines[i];
  utterance=new SpeechSynthesisUtterance(l.t);
  utterance.voice=getVoice(l.s===0?2:l.s);
  utterance.rate=parseFloat(document.getElementById('speed').value);
  utterance.lang='tr-TR';
  utterance.onend=()=>{if(!paused)setTimeout(()=>playLine(i+1),l.s===0?400:200);};
  synth.speak(utterance);
}

function togglePause(){
  if(paused){paused=false;synth.resume();document.getElementById('btn-pause').textContent='⏸ Duraklat';}
  else{paused=true;synth.pause();document.getElementById('btn-pause').textContent='▶ Devam Et';}
}

function stopPlay(){
  synth.cancel();paused=false;currentIdx=-1;setActive(-1);
  document.getElementById('btn-play').disabled=false;
  document.getElementById('btn-pause').disabled=true;
  document.getElementById('btn-stop').disabled=true;
  document.getElementById('btn-pause').textContent='⏸ Duraklat';
}
</script>
</body>
</html>
